name: Complaint Automation

on:
  schedule:
    - cron: '30 4 * * 1'   # Every Monday 10:00 AM IST (04:30 UTC)
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Python Script
        run: python main_pipeline.py
        env:
          YOUTUBE_API_KEY:    ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}

      - name: Save run log
        run: |
          git config user.name  "Pipeline Bot"
          git config user.email "bot@pipeline.com"
          git add yt_last_run.json || true
          git diff --staged --quiet || \
            git commit -m "Weekly run $(date +'%Y-%m-%d')"
          git push || true
